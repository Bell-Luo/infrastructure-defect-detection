# 数据集配置示例
# 把这个文件复制为 data.yaml，然后修改下面的路径

# 数据集根目录（改为你本地的实际路径）
path: E:/crack-seg  # 示例：Windows路径
# path: /home/user/crack-seg  # 示例：Linux路径
# path: /Users/user/Documents/crack-seg  # 示例：Mac路径

# 训练、验证、测试图片的相对路径
train: train/images
val: valid/images
test: test/images

# 缺陷类别
names:
  0: crack
  1: spalling
  2: seepage
  3: damage
  4: corrosion
